global:
  scrape_interval: 5s
  evaluation_interval: 5s
  # Fail-closed: any metric without an "env" label came from an
  # unconfigured scrape job and is immediately visible as anomalous.
  external_labels:
    project: orbit-engine

# ── Recording rules: governance layer ─────────────────────────────────
# All dashboards/alerts MUST use orbit:* recorded metrics.
# Raw orbit_skill_* are FORBIDDEN outside of rule definitions.
rule_files:
  - "orbit_rules.yml"
  - "deploy/prometheus-alerts-security.yml"

scrape_configs:
  # ── Production server (:9100) ─────────────────────────────────────────
  - job_name: orbit-engine-tracking
    honor_labels: false          # Prometheus ALWAYS wins → env cannot be spoofed
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          env: prod
    metrics_path: /metrics

  # ── Development / seed server (:9101) ─────────────────────────────────
  - job_name: orbit-engine-seed
    honor_labels: false
    static_configs:
      - targets: ["localhost:9101"]
        labels:
          env: seed
    metrics_path: /metrics

  # ── Gateway PromQL (:9091) ────────────────────────────────────────────
  - job_name: orbit-engine-gateway
    honor_labels: false
    static_configs:
      - targets: ["localhost:9091"]
        labels:
          env: prod
    metrics_path: /metrics
