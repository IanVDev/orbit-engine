name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-test:
    name: Go tests + vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tracking
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: tracking/go.mod
          cache-dependency-path: tracking/go.sum
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... -count=1

  validate-promql:
    name: PromQL governance rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: tracking/go.mod
          cache-dependency-path: tracking/go.sum
      - name: make validate-promql
        run: make validate-promql
