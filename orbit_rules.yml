# orbit_rules.yml — Recording rules for orbit-engine metric governance.
#
# PURPOSE: Provide pre-filtered, environment-safe metric views.
# All dashboards and alerts MUST use orbit:* recorded metrics,
# NEVER raw orbit_skill_* directly.
#
# Raw metrics without {env=...} filter return MULTIPLE series
# (prod + seed) and WILL produce incorrect aggregations.

groups:
  - name: orbit_governance
    interval: 5s
    rules:
      # ── tokens saved ───────────────────────────────────────────────
      - record: orbit:tokens_saved_total:prod
        expr: orbit_skill_tokens_saved_total{env="prod"}

      - record: orbit:tokens_saved_total:seed
        expr: orbit_skill_tokens_saved_total{env="seed"}

      # ── activations ────────────────────────────────────────────────
      - record: orbit:activations_total:prod
        expr: sum by (mode) (orbit_skill_activations_total{env="prod"})

      - record: orbit:activations_total:seed
        expr: sum by (mode) (orbit_skill_activations_total{env="seed"})

      # ── waste estimated ────────────────────────────────────────────
      - record: orbit:waste_estimated:prod
        expr: orbit_skill_waste_estimated{env="prod"}

      - record: orbit:waste_estimated:seed
        expr: orbit_skill_waste_estimated{env="seed"}

      # ── sessions ───────────────────────────────────────────────────
      - record: orbit:sessions_total:prod
        expr: orbit_skill_sessions_total{env="prod"}

      - record: orbit:sessions_total:seed
        expr: orbit_skill_sessions_total{env="seed"}

      # ── sessions with activation ───────────────────────────────────
      - record: orbit:sessions_with_activation:prod
        expr: orbit_skill_sessions_with_activation_total{env="prod"}

      - record: orbit:sessions_with_activation:seed
        expr: orbit_skill_sessions_with_activation_total{env="seed"}

      # ── sessions without activation ────────────────────────────────
      - record: orbit:sessions_without_activation:prod
        expr: orbit_skill_sessions_without_activation_total{env="prod"}

      - record: orbit:sessions_without_activation:seed
        expr: orbit_skill_sessions_without_activation_total{env="seed"}

      # ── tracking failures ──────────────────────────────────────────
      - record: orbit:tracking_failures_total:prod
        expr: orbit_skill_tracking_failures_total{env="prod"}

      - record: orbit:tracking_failures_total:seed
        expr: orbit_skill_tracking_failures_total{env="seed"}

      # ── freshness (seconds since last event) ───────────────────────
      - record: orbit:event_staleness_seconds:prod
        expr: time() - orbit_last_event_timestamp{env="prod"}

      - record: orbit:event_staleness_seconds:seed
        expr: time() - orbit_last_event_timestamp{env="seed"}

      # ── governance: seed contamination alert helper ────────────────
      - record: orbit:seed_contamination
        expr: orbit_seed_mode{env="prod"} == 1

      # ── governance: misuse detector (raw query returns >1 series) ──
      - record: orbit:env_series_count
        expr: count(orbit_skill_tokens_saved_total) by (__name__)

      # ── activation latency (prod only) ─────────────────────────────
      - record: orbit:activation_latency_p50:prod
        expr: histogram_quantile(0.50, rate(orbit_skill_activation_latency_seconds_bucket{env="prod"}[5m]))

      - record: orbit:activation_latency_p95:prod
        expr: histogram_quantile(0.95, rate(orbit_skill_activation_latency_seconds_bucket{env="prod"}[5m]))

  # ── Alerting rules: operational safety ─────────────────────────────
  - name: orbit_alerts
    interval: 15s
    rules:
      # ALERT 1 — Silence: no events for 10 minutes in prod
      # A system with zero activity is not "healthy" — it's dead.
      - alert: OrbitSilence
        expr: orbit:event_staleness_seconds:prod > 600
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Orbit tracking silencioso há >10min"
          description: "Nenhum evento recebido em {{ $value | humanizeDuration }}. Sistema pode estar morto."

      # ALERT 2 — Tracking failures detected
      - alert: OrbitTrackingFailures
        expr: increase(orbit:tracking_failures_total:prod[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Falhas de tracking detectadas"
          description: "{{ $value }} falha(s) nos últimos 5 min. Fail-closed pode estar bloqueando ativações."

      # ALERT 3 — Seed contamination in prod
      - alert: OrbitSeedContamination
        expr: orbit:seed_contamination == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Contaminação de ambiente: seed detectado em prod"
          description: "orbit_seed_mode=1 em env=prod. Métricas de produção comprometidas."

      # ALERT 4 — Gateway down (no scrape)
      - alert: OrbitGatewayDown
        expr: up{job="orbit-engine-gateway"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Gateway PromQL está down"
          description: "Grafana não consegue consultar métricas. Verificar orbit-gateway."

      # ALERT 5 — Tracking server down
      - alert: OrbitTrackingDown
        expr: up{job="orbit-engine-tracking"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Tracking server está down"
          description: "Nenhum evento pode ser registrado. Serviço morto."

      # ALERT 6 — Zero sessions for extended period (system not generating value)
      - alert: OrbitZeroSessions
        expr: increase(orbit:sessions_total:prod[30m]) == 0 and orbit:sessions_total:prod > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Zero novas sessões nos últimos 30 min"
          description: "Sistema está vivo mas não está gerando valor. Verificar integração."

      # ALERT 7 — High governance block rate (potential misconfiguration)
      - alert: OrbitHighBlockRate
        expr: rate(orbit_gateway_blocked_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taxa alta de bloqueios no gateway (>0.5/s)"
          description: "Possível query malformada em loop ou misconfiguration do Grafana."
